version: "2"
linters:
  enable:
    - asciicheck
    - copyloopvar
    - dogsled
    - durationcheck
    - errorlint
    - exhaustive
    - goconst
    - gomodguard
    - gosec
    - importas
    - lll
    - misspell
    - nakedret
    - nilerr
    - nolintlint
    - predeclared
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - wastedassign
  settings:
    goconst:
      min-occurrences: 10
    gomodguard:
      blocked:
        modules:
          - github.com/ghodss/yaml:
              recommendations:
                - sigs.k8s.io/yaml
          - gopkg.in/yaml.v2:
              recommendations:
                - sigs.k8s.io/yaml
          - gopkg.in/yaml.v3:
              recommendations:
                - sigs.k8s.io/yaml
          - github.com/pkg/errors:
              recommendations:
                - fmt
                - errors
          - golang.org/x/net/context:
              recommendations:
                - context
    testifylint:
      enable-all: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: state/indexers/md5Indexer.*
        text: weak cryptographic primitive
      - linters:
          - gosec
        path: _test\.go
        text: weak random number generator
      - linters:
          - errcheck
        path: _test\.go
        text: Error return value
      - linters:
          - gosec
        path: file/codegen/main.go
        text: Expect WriteFile permissions to be 0600 or less
      - linters:
          - unparam
          - unused
        path: test_.*
      - linters:
          - staticcheck
        text: SA1019.*
       # Exclude gosec G101 (hardcoded credentials) for test files
      - linters:
          - gosec
        path: _test\.go
        text: G101
      # Exclude gosec G704 (SSRF) for test files where HTTP requests are expected
      - linters:
          - gosec
        path: tests/integration/
        text: G704
      # Exclude gosec G101 for static entity maps (false positive on entity type names)
      - linters:
          - gosec
        path: (pkg/state/.*|pkg/utils/.*|pkg/schema/fetchers.*)\.go
        text: G101
      - linters:
          - gosec
        path: (pkg/state/.*|pkg/utils/.*)\.go
        text: G117
      # Exclude G704 for files where HTTP requests are expected
      - linters:
          - gosec
        path: (pkg/konnect/client|pkg/konnect/.*_test)\.go
        text: G704
      # Exclude G115 integer overflow (uintptr -> int for terminal check)
      - linters:
          - gosec
        path: pkg/file/readfile\.go
        text: G115
      # Exclude revive var-naming for package name warnings
      - linters:
          - revive
        text: "avoid meaningless package names"
      # Exclude gomodguard for integration test files
      - linters:
          - gomodguard
        path: tests/integration/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
