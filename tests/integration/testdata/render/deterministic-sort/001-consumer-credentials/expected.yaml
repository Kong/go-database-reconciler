_format_version: "3.0"
consumers:
- acls:
  - group: alpha-group
  - group: beta-group
  - group: zebra-group
  basicauth_credentials:
  - password: pass2
    username: alpha-basic
  - password: pass3
    username: beta-basic
  - password: pass1
    username: zebra-basic
  hmacauth_credentials:
  - secret: secret-alpha
    username: alpha-hmac
  - secret: secret-beta
    username: beta-hmac
  - secret: secret-zebra
    username: zebra-hmac
  jwt_secrets:
  - algorithm: HS256
    key: alpha-jwt
    secret: jwt-secret-alpha
  - algorithm: HS256
    key: beta-jwt
    secret: jwt-secret-beta
  - algorithm: HS256
    key: zebra-jwt
    secret: jwt-secret-zebra
  keyauth_credentials:
  - key: alpha-key
  - key: beta-key
  - key: zebra-key
  oauth2_credentials:
  - client_id: alpha-client
    client_secret: secret2
    name: alpha-oauth
  - client_id: beta-client
    client_secret: secret3
    name: beta-oauth
  - client_id: zebra-client
    client_secret: secret1
    name: zebra-oauth
  username: test-consumer
