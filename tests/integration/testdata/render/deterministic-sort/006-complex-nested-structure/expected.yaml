_format_version: "3.0"
certificates:
- cert: |
    -----BEGIN CERTIFICATE-----
    cert-content
    -----END CERTIFICATE-----
  id: cert-1
  key: |
    -----BEGIN RSA PRIVATE KEY-----
    key-content
    -----END RSA PRIVATE KEY-----
  snis:
  - name: alpha.example.com
  - name: mike.example.com
  - name: zulu.example.com
consumers:
- acls:
  - group: alpha-acl
  - group: mike-acl
  - group: zulu-acl
  basicauth_credentials:
  - password: pass2
    username: alpha-user
  - password: pass3
    username: mike-user
  - password: pass1
    username: zulu-user
  hmacauth_credentials:
  - secret: secret2
    username: alpha-hmac
  - secret: secret3
    username: mike-hmac
  - secret: secret1
    username: zulu-hmac
  jwt_secrets:
  - algorithm: HS256
    key: alpha-jwt
    secret: jwt-secret2
  - algorithm: HS256
    key: mike-jwt
    secret: jwt-secret3
  - algorithm: HS256
    key: zulu-jwt
    secret: jwt-secret1
  keyauth_credentials:
  - key: alpha-key
  - key: mike-key
  - key: zulu-key
  oauth2_credentials:
  - client_id: alpha-oauth
    client_secret: secret2
    name: alpha-oauth-app
  - client_id: mike-oauth
    client_secret: secret3
    name: mike-oauth-app
  - client_id: zulu-oauth
    client_secret: secret1
    name: zulu-oauth-app
  username: alpha-consumer
- username: mike-consumer
- username: zulu-consumer
services:
- connect_timeout: 60000
  host: alpha-service.example.com
  name: alpha-service
  plugins:
  - name: basic-auth
  - name: jwt
  - config:
      key_names:
      - apikey
    name: key-auth
  protocol: http
  read_timeout: 60000
  routes:
  - name: alpha-route
    paths:
    - /alpha
    plugins:
    - config:
        allow:
        - group1
      name: acl
    - config:
        origins:
        - '*'
      name: cors
    - config:
        minute: 100
      name: rate-limiting
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  - name: mike-route
    paths:
    - /mike
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  - name: zulu-route
    paths:
    - /zulu
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  write_timeout: 60000
- connect_timeout: 60000
  host: mike-service.example.com
  name: mike-service
  protocol: http
  read_timeout: 60000
  routes:
  - name: beta-route
    paths:
    - /beta
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  - name: delta-route
    paths:
    - /delta
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  write_timeout: 60000
- connect_timeout: 60000
  host: zulu-service.example.com
  name: zulu-service
  protocol: http
  read_timeout: 60000
  routes:
  - name: gamma-route
    paths:
    - /gamma
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    strip_path: true
  write_timeout: 60000
upstreams:
- hash_fallback: none
  hash_on: none
  hash_on_cookie_path: /
  healthchecks:
    active:
      concurrency: 10
      healthy:
        http_statuses:
        - 200
        - 302
        interval: 0
        successes: 0
      http_path: /
      timeout: 1
      type: http
      unhealthy:
        http_failures: 0
        http_statuses:
        - 429
        - 404
        - 500
        - 501
        - 502
        - 503
        - 504
        - 505
        interval: 0
        tcp_failures: 0
        timeouts: 0
    passive:
      healthy:
        http_statuses:
        - 200
        - 201
        - 202
        - 203
        - 204
        - 205
        - 206
        - 207
        - 208
        - 226
        - 300
        - 301
        - 302
        - 303
        - 304
        - 305
        - 306
        - 307
        - 308
        successes: 0
      unhealthy:
        http_failures: 0
        http_statuses:
        - 429
        - 500
        - 503
        tcp_failures: 0
        timeouts: 0
  name: alpha-upstream
  slots: 10000
  targets:
  - target: alpha.local:8080
    weight: 100
  - target: mike.local:8080
    weight: 100
  - target: zulu.local:8080
    weight: 100
